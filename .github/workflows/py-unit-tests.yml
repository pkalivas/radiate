name: py-unit-tests

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Run Python in development mode
        run: just develop 3.12

      - name: Run Python unit tests
        run: just test py