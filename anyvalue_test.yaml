alters:
- GraphCrossover:
    rate:
      Fixed:
        value: 0.5
    parent_node_rate: 0.5
- OperationMutator:
    rate:
      Fixed:
        value: 0.07
    replace_rate: 0.05
- GraphMutator:
    vertex_rate: 0.1
    edge_rate: 0.1
    allow_recurrent: false
codec:
  GraphCodec<Op<f32>>:
    template:
      GraphCodec<Op<f32>>:
        aaaaaaaa: 1
        output_size: 1
        vertex_size: 0
        edge_size: 0
        template_size: 2
max_age:
  value: 20
max_species_age:
  value: 25
objective:
  Single:
    optimize: Minimize
offspring_fraction:
  value: 0.8
population_size:
  value: 100
replacement_strategy:
  EncodeReplace: {}
selectors:
  offspring:
    BoltzmannSelector:
      temperature: 4.0
  survivor:
    TournamentSelector:
      k: 3
species_threshold:
  Fixed:
    value: 0.5
