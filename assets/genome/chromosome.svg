<svg xmlns="http://www.w3.org/2000/svg" width="540" height="150" viewBox="0 0 540 150" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect x="0.5" y="0.5" width="539" height="149" rx="12" fill="#ffffff" stroke="#d0d7de"/>
  <text x="24" y="36" font-size="18" font-weight="700" fill="#1f2328">Chromosome</text>
  <text x="24" y="56" font-size="12" fill="#57606a">a list of Genes</text>

  <rect x="24" y="68" width="492" height="50" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>

  <!-- genes -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#0a3069">
    <rect x="40"  y="76" width="64" height="34" rx="6" fill="#ddf4ff" stroke="#54aeff"/>
    <text x="72"  y="98" text-anchor="middle">0.42</text>
    <rect x="118" y="76" width="64" height="34" rx="6" fill="#ddf4ff" stroke="#54aeff"/>
    <text x="150" y="98" text-anchor="middle">-1.3</text>
    <rect x="196" y="76" width="64" height="34" rx="6" fill="#ddf4ff" stroke="#54aeff"/>
    <text x="228" y="98" text-anchor="middle">0.07</text>
    <rect x="274" y="76" width="64" height="34" rx="6" fill="#ddf4ff" stroke="#54aeff"/>
    <text x="306" y="98" text-anchor="middle">2.51</text>
    <text x="360" y="98" fill="#57606a">. . .</text>
  </g>

  <text x="24" y="138" font-size="11" fill="#57606a">each box is a Gene — the value inside is its Allele</text>
</svg>
