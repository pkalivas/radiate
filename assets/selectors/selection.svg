<svg xmlns="http://www.w3.org/2000/svg" width="640" height="348" viewBox="0 0 640 348" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#57606a"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="639" height="347" rx="12" fill="#ffffff" stroke="#d0d7de"/>

  <!-- Population -->
  <rect x="250" y="22" width="140" height="38" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="320" y="46" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2328">Population</text>

  <!-- branches to selectors -->
  <line x1="300" y1="60" x2="170" y2="94" stroke="#57606a" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="340" y1="60" x2="470" y2="94" stroke="#57606a" stroke-width="2" marker-end="url(#ah)"/>

  <!-- selector boxes -->
  <rect x="56"  y="96" width="208" height="38" rx="8" fill="#ddf4ff" stroke="#54aeff"/>
  <text x="160" y="120" text-anchor="middle" font-size="13" fill="#0a3069">survivor selector</text>
  <rect x="376" y="96" width="208" height="38" rx="8" fill="#ddf4ff" stroke="#54aeff"/>
  <text x="480" y="120" text-anchor="middle" font-size="13" fill="#0a3069">offspring selector</text>

  <!-- survivor path -->
  <line x1="160" y1="134" x2="160" y2="174" stroke="#57606a" stroke-width="2" marker-end="url(#ah)"/>
  <rect x="56" y="176" width="208" height="48" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="160" y="198" text-anchor="middle" font-size="13" fill="#1f2328">survivors</text>
  <text x="160" y="215" text-anchor="middle" font-size="11" fill="#57606a">passed through unchanged</text>

  <!-- offspring path (through alters) -->
  <line x1="480" y1="134" x2="480" y2="142" stroke="#57606a" stroke-width="2"/>
  <rect x="416" y="142" width="128" height="24" rx="12" fill="#fff8c5" stroke="#d4a72c"/>
  <text x="480" y="158" text-anchor="middle" font-size="10" fill="#7d4e00">crossover + mutation</text>
  <line x1="480" y1="166" x2="480" y2="174" stroke="#57606a" stroke-width="2" marker-end="url(#ah)"/>
  <rect x="376" y="176" width="208" height="48" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="480" y="198" text-anchor="middle" font-size="13" fill="#1f2328">offspring</text>
  <text x="480" y="215" text-anchor="middle" font-size="11" fill="#57606a">new individuals</text>

  <!-- merge into next generation -->
  <line x1="160" y1="224" x2="290" y2="268" stroke="#57606a" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="480" y1="224" x2="350" y2="268" stroke="#57606a" stroke-width="2" marker-end="url(#ah)"/>
  <rect x="230" y="270" width="180" height="44" rx="8" fill="#dafbe1" stroke="#2da44e"/>
  <text x="320" y="297" text-anchor="middle" font-size="14" font-weight="700" fill="#1a7f37">Next generation</text>

  <text x="40" y="336" font-size="11" fill="#57606a">the offspring fraction sets the split — by default 20% survivors and 80% offspring</text>
</svg>
