<svg xmlns="http://www.w3.org/2000/svg" width="680" height="220" viewBox="0 0 680 220" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#57606a"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="679" height="219" rx="12" fill="#ffffff" stroke="#d0d7de"/>

  <!-- column headers -->
  <text x="40" y="36" font-size="14" font-weight="700" fill="#1f2328">Problem space</text>
  <text x="40" y="54" font-size="11" fill="#57606a">what your fitness function sees</text>
  <text x="456" y="36" font-size="14" font-weight="700" fill="#1f2328">Solution space</text>
  <text x="456" y="54" font-size="11" fill="#57606a">what the engine evolves</text>

  <!-- problem-space value -->
  <rect x="40" y="88" width="184" height="84" rx="10" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="132" y="126" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#0a3069">[0.42, -1.3]</text>
  <text x="132" y="150" text-anchor="middle" font-size="11" fill="#57606a">Vec&lt;f32&gt;</text>

  <!-- solution-space genotype -->
  <rect x="456" y="88" width="184" height="84" rx="10" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="468" y="108" font-size="10" fill="#57606a">Genotype</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#0a3069">
    <rect x="474" y="118" width="56" height="32" rx="5" fill="#ddf4ff" stroke="#54aeff"/><text x="502" y="139" text-anchor="middle">0.42</text>
    <rect x="536" y="118" width="56" height="32" rx="5" fill="#ddf4ff" stroke="#54aeff"/><text x="564" y="139" text-anchor="middle">-1.3</text>
  </g>

  <!-- bridge -->
  <text x="340" y="108" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#1f2328">encode()</text>
  <line x1="232" y1="116" x2="448" y2="116" stroke="#57606a" stroke-width="2" marker-end="url(#ah)"/>
  <text x="340" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#7d4e00">Codec</text>
  <line x1="448" y1="148" x2="232" y2="148" stroke="#57606a" stroke-width="2" marker-end="url(#ah)"/>
  <text x="340" y="166" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#1f2328">decode()</text>

  <text x="40" y="202" font-size="11" fill="#57606a">encode() builds the Genotype the engine evolves; decode() returns the value your fitness function uses — the engine calls both for you</text>
</svg>
