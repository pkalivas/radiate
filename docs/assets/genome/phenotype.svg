<svg xmlns="http://www.w3.org/2000/svg" width="660" height="296" viewBox="0 0 660 296" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect x="0.5" y="0.5" width="659" height="295" rx="12" fill="#ffffff" stroke="#d0d7de"/>
  <text x="24" y="36" font-size="18" font-weight="700" fill="#1f2328">Phenotype</text>
  <text x="24" y="56" font-size="12" fill="#57606a">a Genotype plus its evaluation state</text>

  <!-- Genotype block -->
  <rect x="24" y="70" width="392" height="200" rx="10" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="36" y="92" font-size="13" font-weight="700" fill="#1f2328">Genotype</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#0a3069">
    <!-- Chromosome 0 -->
    <rect x="36" y="104" width="368" height="40" rx="8" fill="#eef1f4" stroke="#d8dee4"/>
    <text x="48" y="128" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#57606a">Chromosome 0</text>
    <rect x="150" y="111" width="44" height="26" rx="5" fill="#ddf4ff" stroke="#54aeff"/><text x="172" y="128" text-anchor="middle">0.42</text>
    <rect x="202" y="111" width="44" height="26" rx="5" fill="#ddf4ff" stroke="#54aeff"/><text x="224" y="128" text-anchor="middle">-1.3</text>
    <rect x="254" y="111" width="44" height="26" rx="5" fill="#ddf4ff" stroke="#54aeff"/><text x="276" y="128" text-anchor="middle">0.07</text>
    <rect x="306" y="111" width="44" height="26" rx="5" fill="#ddf4ff" stroke="#54aeff"/><text x="328" y="128" text-anchor="middle">2.51</text>

    <!-- Chromosome 1 -->
    <rect x="36" y="150" width="368" height="40" rx="8" fill="#eef1f4" stroke="#d8dee4"/>
    <text x="48" y="174" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#57606a">Chromosome 1</text>
    <rect x="150" y="157" width="44" height="26" rx="5" fill="#ddf4ff" stroke="#54aeff"/><text x="172" y="174" text-anchor="middle">1.10</text>
    <rect x="202" y="157" width="44" height="26" rx="5" fill="#ddf4ff" stroke="#54aeff"/><text x="224" y="174" text-anchor="middle">0.93</text>

    <!-- Chromosome 2 -->
    <rect x="36" y="196" width="368" height="40" rx="8" fill="#eef1f4" stroke="#d8dee4"/>
    <text x="48" y="220" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#57606a">Chromosome 2</text>
    <rect x="150" y="203" width="44" height="26" rx="5" fill="#ddf4ff" stroke="#54aeff"/><text x="172" y="220" text-anchor="middle">-0.50</text>
    <rect x="202" y="203" width="44" height="26" rx="5" fill="#ddf4ff" stroke="#54aeff"/><text x="224" y="220" text-anchor="middle">0.00</text>
    <rect x="254" y="203" width="44" height="26" rx="5" fill="#ddf4ff" stroke="#54aeff"/><text x="276" y="220" text-anchor="middle">3.14</text>
  </g>

  <!-- plus sign -->
  <text x="424" y="180" font-size="22" font-weight="700" fill="#57606a">+</text>

  <!-- Evaluation state panel -->
  <rect x="444" y="70" width="192" height="200" rx="10" fill="#fff8c5" stroke="#d4a72c"/>
  <text x="460" y="96" font-size="13" font-weight="700" fill="#7d4e00">Evaluation state</text>
  <g font-size="12">
    <text x="460" y="140" fill="#57606a">id</text>
    <text x="620" y="140" text-anchor="end" font-family="ui-monospace, Menlo, monospace" fill="#1f2328">180342</text>
    <text x="460" y="178" fill="#57606a">score</text>
    <text x="620" y="178" text-anchor="end" font-family="ui-monospace, Menlo, monospace" fill="#1f2328">[0.0271]</text>
    <text x="460" y="216" fill="#57606a">generation</text>
    <text x="620" y="216" text-anchor="end" font-family="ui-monospace, Menlo, monospace" fill="#1f2328">14</text>
  </g>

  <text x="24" y="290" font-size="11" fill="#57606a">a Phenotype is the "living" individual the engine evolves — a Genotype the engine has scored and tracks</text>
</svg>
